<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoreMaster V2</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-mode">
    <div id="login-overlay" class="overlay active">
        <div class="glass-modal max-w-sm">
            <h1 class="text-gradient">StoreMaster</h1>
            <p class="subtitle">Cloud Manager v2.0</p>
            <div id="login-error" class="hidden alert-error"></div>
            <div class="input-group">
                <i class="fa-solid fa-user icon"></i>
                <input type="text" id="username" placeholder="Usuário (admin)">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock icon"></i>
                <input type="password" id="password" placeholder="Senha (admin123)">
            </div>
            <button onclick="loginAPI()" class="btn-primary w-full shadow-glow">Entrar no Sistema</button>
        </div>
    </div>

    <div id="app-wrapper" class="hidden">
        <aside class="sidebar glass-panel">
            <h2 class="text-gradient logo"><i class="fa-brands fa-cloudscale"></i> StoreMaster</h2>
            <nav>
                <button onclick="nav('dashboard')" class="nav-btn active" id="nav-dashboard">Painel de Bordo</button>
                <button onclick="nav('produtos')" class="nav-btn" id="nav-produtos">Estoque</button>
                <button onclick="nav('vendas')" class="nav-btn" id="nav-vendas">Vendas</button>
            </nav>
            <button onclick="logout()" class="nav-btn logout">Sair</button>
        </aside>

        <main class="content-area">
            <section id="view-dashboard" class="view active">
                <header class="section-header"><h2>Dashboard</h2></header>
                <div class="kpi glass-panel">
                    <div class="kpi-info"><span>Faturamento: </span><strong id="kpi-faturamento">R$ 0,00</strong></div>
                </div>
                <div class="chart-container glass-panel mt-4">
                    <canvas id="myChart"></canvas>
                </div>
            </section>

            <section id="view-produtos" class="view hidden">
                <header class="section-header"><h2>Produtos</h2></header>
                <div class="glass-panel form-bar mb-4">
                    <input type="text" id="prod-nome" placeholder="Nome">
                    <input type="number" id="prod-qtd" placeholder="Qtd" min="1">
                    <input type="number" id="prod-preco" placeholder="Preço" step="0.01">
                    <button onclick="addProduto()" class="btn-primary">Adicionar</button>
                </div>
                <table class="modern-table" id="tabela-produtos">
                    <thead><tr><th>ID</th><th>Nome</th><th>Qtd</th><th>Preço</th><th>Ação</th></tr></thead>
                    <tbody></tbody>
                </table>
            </section>

            <section id="view-vendas" class="view hidden">
                <header class="section-header"><h2>Vendas</h2></header>
                <div class="glass-panel form-bar mb-4">
                    <select id="venda-produto-id"></select>
                    <input type="number" id="venda-qtd" placeholder="Qtd" min="1">
                    <button onclick="registrarVenda()" class="btn-success">Vender</button>
                </div>
                <table class="modern-table" id="tabela-vendas">
                    <thead><tr><th>ID</th><th>Produto</th><th>Qtd</th><th>Total</th><th>Data</th></tr></thead>
                    <tbody></tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
